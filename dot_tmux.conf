unbind C-b
set -g prefix `
bind-key ` last-window
bind-key e send-prefix
bind-key  %  split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20
setw -g mode-keys vi

set-option -g history-limit 5000
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "nordtheme/tmux"
set -g @nord_tmux_show_status_content 0

# Nord colors
nord0="colour235"
nord1="colour236"
nord3="colour238"
nord4="colour59"
nord8="colour14"
nord9="colour12"

# Width-aware window format: number only when narrow (<120), full name when wide
narrow="#{?#{e|<|:#{client_width},120}"

setw -g window-status-separator ""
setw -g window-status-current-format "${narrow},\
#[fg=${nord0},bg=${nord8}] #I #[fg=${nord8},bg=${nord0}],\
#[fg=${nord8},bg=${nord1}] #I #[fg=colour255]#W #[fg=${nord1},bg=${nord0}]}"
setw -g window-status-format "${narrow},\
#[fg=${nord0},bg=${nord4}] #I #[fg=${nord4},bg=${nord0}],\
#[fg=${nord4},bg=${nord1}] #I #[fg=colour250]#W #[fg=${nord1},bg=${nord0}]}"

# Initialize and run tpm
run '~/.tmux/plugins/tpm/tpm'

